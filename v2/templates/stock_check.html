{% extends "base.html" %}
{% block title %}Stock Check{% endblock %}
{% block content %}
<div class="page-title" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px">
  <span>Stock Check <span class="sub" id="progress">0 / {{ total }} checked</span></span>
  <span style="display:flex;gap:8px">
    <a class="btn ghost small" id="print-link" href="/stock-check/print" target="_blank">Print list</a>
    <button class="btn ghost small" id="reset">Reset all</button>
  </span>
</div>

<div class="filters">
  <input type="text" id="f-search" placeholder="Search name, set, cert…  ( / )">
  <select id="f-company">
    <option value="">All graders</option>
    {% for c in companies %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
  </select>
  <select id="f-show">
    <option value="">Show all</option>
    <option value="unchecked">Unchecked only</option>
    <option value="checked">Checked only</option>
  </select>
  <select id="f-stale">
    <option value="">Any price age</option>
    <option value="stale">Not repriced in 30+ days</option>
    <option value="none">No market value</option>
  </select>
  <span class="hint">Tap a row to check off · click a price to edit · saved on this device</span>
</div>

<div class="table-wrap">
  <table>
    <thead><tr>
      <th style="width:44px"></th>
      <th style="width:86px">Grade</th>
      <th>Card</th>
      <th style="width:70px">Card #</th>
      <th class="num" style="width:130px">Market Value</th>
      <th style="width:96px">Repriced</th>
    </tr></thead>
    <tbody id="tbody"></tbody>
  </table>
</div>

<script>
const CARDS = {{ cards|tojson }};
const KEY = "cardvault_stock_check";
const $ = id => document.getElementById(id);

let checked = new Set(JSON.parse(localStorage.getItem(KEY) || "[]"));
let view = [];

function save() { localStorage.setItem(KEY, JSON.stringify([...checked])); }

function isStale(r) {
  if (!r.repriced) return true;
  return (Date.now() - new Date(r.repriced.slice(0, 10))) / 864e5 > 30;
}

function applyFilters() {
  const q = $("f-search").value.trim().toLowerCase();
  const co = $("f-company").value, show = $("f-show").value, stale = $("f-stale").value;
  view = CARDS.filter(r => {
    if (co && r.company !== co) return false;
    if (show === "checked" && !checked.has(r.id)) return false;
    if (show === "unchecked" && checked.has(r.id)) return false;
    if (stale === "stale" && !isStale(r)) return false;
    if (stale === "none" && r.market_value !== null) return false;
    if (q) {
      const hay = (r.name + " " + r.set + " " + r.cert + " " + r.number).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });
  render();
}

function render() {
  tbody.innerHTML = view.map((r, i) => `
    <tr data-id="${r.id}" data-i="${i}" style="cursor:pointer${checked.has(r.id) ? ';opacity:.5' : ''}">
      <td style="text-align:center;font-size:16px">${checked.has(r.id) ? "☑" : "☐"}</td>
      <td><span class="chip">${esc(r.company)} ${esc(r.grade)}</span></td>
      <td><strong style="${checked.has(r.id) ? 'text-decoration:line-through' : ''}">${esc(r.name)}</strong>
        ${r.set ? `<span class="muted"> · ${esc(r.set)}</span>` : ''}
        ${r.cert ? `<div class="sub-line">cert ${esc(r.cert)}</div>` : ''}</td>
      <td class="muted">${r.number ? "#" + esc(r.number) : "—"}</td>
      <td class="num mv-cell" data-i="${i}" title="Click to reprice">${fmt(r.market_value)}</td>
      <td class="${isStale(r) ? 'stale' : 'muted'}">
        ${r.repriced ? r.repriced.slice(0, 10) : "never"}</td>
    </tr>`).join("");
  const total = CARDS.length;
  const done = CARDS.filter(c => checked.has(c.id)).length;
  $("progress").textContent = `${done} / ${total} checked`;
  $("progress").className = "sub " + (done === total && total ? "pos" : "");
}

/* inline repricing — same flow as Collection: Enter saves, Tab saves + next row */
function beginPrice(i) {
  const r = view[i];
  if (!r) return;
  const cell = tbody.querySelector(`td.mv-cell[data-i="${i}"]`);
  if (!cell || cell.querySelector("input")) return;
  cell.innerHTML = `<input type="text" value="${r.market_value ?? ""}">`;
  const inp = cell.querySelector("input");
  inp.focus(); inp.select();

  let committed = false;   // Enter + blur both fire — only the first wins
  const commit = async (moveNext) => {
    if (committed) return;
    const raw = inp.value.trim().replace(/[$,]/g, "");
    if (raw !== "" && isNaN(parseFloat(raw))) { inp.focus(); return; }
    committed = true;
    try {
      const res = await postJSON("/api/reprice",
        { card_id: r.id, market_value: raw === "" ? null : parseFloat(raw) });
      r.market_value = res.market_value;
      r.repriced = res.repriced || "";
    } catch (e) { toast("Save failed: " + e.message, "error"); }
    applyFilters();
    const saved = tbody.querySelector(`tr[data-id="${r.id}"] td.mv-cell`);
    if (saved) { saved.classList.add("saved-flash");
                 setTimeout(() => saved.classList.remove("saved-flash"), 900); }
    if (moveNext && view.length) {
      // if the committed row filtered itself out of view, index i already
      // points at the next card — advancing again would skip one
      const stillHere = view.some(v => v.id === r.id);
      const next = Math.min(stillHere ? i + 1 : i, view.length - 1);
      if (next >= 0) beginPrice(next);
    }
  };
  inp.addEventListener("keydown", ev => {
    if (ev.key === "Enter") { ev.preventDefault(); commit(false); }
    else if (ev.key === "Tab") { ev.preventDefault(); commit(true); }
    else if (ev.key === "Escape") { render(); }
    ev.stopPropagation();
  });
  inp.addEventListener("blur", () => { if (tbody.contains(inp)) commit(false); });
}

const tbody = $("tbody");
tbody.addEventListener("click", e => {
  const priceCell = e.target.closest("td.mv-cell");
  if (priceCell) { beginPrice(+priceCell.dataset.i); return; }   // price edit, not a check-off
  const tr = e.target.closest("tr");
  if (!tr) return;
  const id = +tr.dataset.id;
  checked.has(id) ? checked.delete(id) : checked.add(id);
  save();
  applyFilters();
});

$("reset").addEventListener("click", async () => {
  if (checked.size && !(await confirmDialog({
    title: "Clear all check marks?",
    body: "Progress is stored on this device only — this starts the stock check over.",
    confirmText: "Clear all", danger: true,
  }))) return;
  checked.clear(); save(); applyFilters();
});

["f-search", "f-company", "f-show", "f-stale"].forEach(id =>
  $(id).addEventListener("input", applyFilters));

// keep the print link scoped to the grader filter
$("f-company").addEventListener("input", () => {
  const co = $("f-company").value;
  $("print-link").href = "/stock-check/print" + (co ? "?company=" + encodeURIComponent(co) : "");
});

document.addEventListener("keydown", e => {
  if (e.key === "/" && e.target.tagName !== "INPUT" && e.target.tagName !== "SELECT") {
    e.preventDefault(); $("f-search").focus();
  }
});

applyFilters();
</script>
{% endblock %}
