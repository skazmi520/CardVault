<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}CardVault{% endblock %} · CardVault v2</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%23101216'/%3E%3Crect x='7' y='4.5' width='18' height='23' rx='3' fill='none' stroke='%234f8cff' stroke-width='2.2'/%3E%3Crect x='11' y='8.5' width='10' height='3' rx='1.5' fill='%234f8cff'/%3E%3Crect x='11' y='15' width='10' height='8.5' rx='1.5' fill='none' stroke='%2374d0ff' stroke-width='1.6'/%3E%3C/svg%3E">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="brand">
      <svg class="brand-mark" viewBox="0 0 32 32" aria-hidden="true">
        <defs><linearGradient id="cv-mark" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stop-color="#4f8cff"/><stop offset="1" stop-color="#74d0ff"/>
        </linearGradient></defs>
        <rect x="4" y="1.5" width="24" height="29" rx="4" fill="none" stroke="url(#cv-mark)" stroke-width="2.6"/>
        <rect x="9" y="6.5" width="14" height="4" rx="2" fill="#4f8cff"/>
        <rect x="9" y="15" width="14" height="11" rx="2" fill="none" stroke="#74d0ff" stroke-width="2" opacity=".75"/>
      </svg>
      <span class="brand-text">Card<b>Vault</b></span></div>
    <div class="nav-section">Portfolio</div>
    <a class="nav-link {{ 'active' if active=='dashboard' }}" href="/">Dashboard</a>
    <a class="nav-link {{ 'active' if active=='collection' }}" href="/collection">Collection</a>
    <a class="nav-link {{ 'active' if active=='reports' }}" href="/reports">Reports</a>
    <div class="nav-section">Trading</div>
    <a class="nav-link {{ 'active' if active=='deals' }}" href="/deals">Deals</a>
    <a class="nav-link {{ 'active' if active=='evaluator' }}" href="/evaluator">Evaluator</a>
    <div class="nav-section">Workflow</div>
    <a class="nav-link {{ 'active' if active=='raw' }}" href="/raw">Raw &amp; Grading</a>
    <a class="nav-link {{ 'active' if active=='stock-check' }}" href="/stock-check">Stock Check</a>
    <a class="nav-link {{ 'active' if active=='photos' }}" href="/photos">Slab Photos</a>
    <a class="nav-link {{ 'active' if active=='backfill' }}" href="/backfill">Backfill</a>
    <div class="spacer"></div>
    <div class="foot">v2 · local</div>
  </nav>
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
